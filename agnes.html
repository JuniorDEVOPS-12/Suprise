<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pour toi, mon amour ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Playfair Display', system-ui, sans-serif;
            background: linear-gradient(135deg, #fef5f7 0%, #ffe4e9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 700px;
            margin: auto;
        }

        .page {
            background: rgba(255, 250, 252, 0.98);
            border-radius: 48px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 200, 210, 0.5) inset;
            padding: 2rem 1.8rem;
            text-align: center;
            animation: fadeSlideUp 0.5s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #b13b4b;
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
        }

        h2 {
            font-size: 1.8rem;
            color: #c95c6c;
            margin: 1rem 0;
            font-weight: 500;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a14b59;
            margin-bottom: 2rem;
            font-style: italic;
        }

        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin: 2rem 0;
        }

        .choice-card {
            background: linear-gradient(135deg, #fff5f7, #fff0f3);
            border: 2px solid #ffd0d9;
            border-radius: 70px;
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(177, 59, 75, 0.1);
        }

        .choice-card:hover {
            transform: translateX(8px) scale(1.02);
            background: #ffe9ef;
            border-color: #e29aa8;
            box-shadow: 0 8px 20px rgba(177, 59, 75, 0.2);
        }

        .choice-card:active {
            transform: scale(0.98);
        }

        .choice-icon {
            font-size: 3.2rem;
            min-width: 70px;
            text-align: center;
        }

        .choice-text {
            flex: 1;
            text-align: left;
        }

        .choice-text h3 {
            font-size: 1.4rem;
            color: #b13b4b;
            margin-bottom: 0.2rem;
        }

        .choice-text p {
            font-size: 0.9rem;
            color: #c27a86;
        }

        button {
            background: #fff0f2;
            border: none;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            color: #b13b4b;
            border: 1px solid #ffc2ce;
        }

        button:hover {
            transform: scale(1.02);
            background: #ffe2e8;
        }

        .btn-primary {
            background: #b13b4b;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #9a2e3e;
        }

        .retour-btn {
            margin-top: 20px;
            background: #e6cfd4;
            color: #7e3c46;
        }

        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.2rem;
            margin: 1.8rem 0;
            max-height: 550px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .photo-item {
            background: #fce9ed;
            border-radius: 24px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .photo-item:hover {
            transform: scale(1.03);
            background: #ffe0e6;
            box-shadow: 0 6px 14px rgba(177, 59, 75, 0.15);
        }

        .real-photo {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .love-emojis {
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: #c95c6c;
        }

        .photo-placeholder {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }

        .love-letter {
            background: #fff6f8;
            padding: 1.8rem;
            border-radius: 32px;
            text-align: left;
            font-size: 1rem;
            line-height: 1.6;
            color: #4f2e34;
            margin: 1.5rem 0;
            font-family: 'Georgia', serif;
            box-shadow: 0 10px 18px rgba(0,0,0,0.05);
            max-height: 500px;
            overflow-y: auto;
        }

        .love-letter p {
            margin-bottom: 1rem;
        }

        .signature {
            text-align: right;
            font-style: italic;
            margin-top: 1rem;
            font-weight: 500;
            color: #b13b4b;
        }

        /* Lecteur YouTube - version corrigée */
        .youtube-container {
            margin: 1.5rem 0;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .youtube-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Lien alternatif si l'iframe ne charge pas */
        .video-fallback {
            margin-top: 1rem;
            padding: 1rem;
            background: #ffe0e6;
            border-radius: 60px;
        }
        
        .video-fallback a {
            color: #b13b4b;
            text-decoration: none;
            font-weight: bold;
        }
        
        .video-fallback a:hover {
            text-decoration: underline;
        }

        .warning-text {
            font-size: 0.85rem;
            color: #c47a86;
            margin-top: 1rem;
        }

        .photo-gallery::-webkit-scrollbar {
            width: 6px;
        }
        .photo-gallery::-webkit-scrollbar-track {
            background: #ffe0e6;
            border-radius: 10px;
        }
        .photo-gallery::-webkit-scrollbar-thumb {
            background: #c95c6c;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .page {
                padding: 1.5rem;
            }
            h1 { font-size: 1.6rem; }
            .choice-icon { font-size: 2.5rem; min-width: 55px; }
            .choice-text h3 { font-size: 1.2rem; }
            .photo-gallery {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
            .love-emojis {
                font-size: 1rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>

<script>
    // ==================== TA CHANSON YOUTUBE (VERSION CORRIGÉE) ====================
    // Version 1: Format standard sans paramètres problématiques
    const YOUTUBE_VIDEO_ID = "tvqTdceUYu0";
    const YOUTUBE_EMBED_URL = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}`;
    
    // Version alternative avec les bons paramètres
    const YOUTUBE_EMBED_URL_ALT = `https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?autoplay=0&rel=0`;
    
    // Lien direct vers la vidéo (au cas où l'iframe ne fonctionne pas)
    const YOUTUBE_WATCH_URL = `https://www.youtube.com/watch?v=${YOUTUBE_VIDEO_ID}`;
    
    // ==================== TES 14 PHOTOS ====================
    const PHOTOS_ALBUM = [
        { src: 'img/photo_5_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_8_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_2_2026-03-27_21-14-17.jpg' },
        { src: 'img/photo_3_2026-03-27_21-14-17.jpg' },
        { src: 'img/photo_1_2026-03-27_21-14-17.jpg' },
        { src: 'img/photo_2_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_3_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_4_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_4_2026-03-27_21-14-17.jpg' },
        { src: 'img/photo_6_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_7_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_10_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_1_2026-03-27_21-13-59.jpg' },
        { src: 'img/photo_9_2026-03-27_21-13-59.jpg' }
    ];
    
    const LOVE_EMOJIS_LIST = [
        "❤️ 💕 💗", "💖 💘 💝", "💓 💞 💕", "❤️ 💖 💗", 
        "💘 💓 💞", "💝 ❤️ 💖", "💕 💗 💓", "💞 💘 ❤️",
        "❤️‍🔥 💖 💕", "💗 💓 💞", "💘 💝 ❤️", "💖 💕 💗"
    ];
    
    function getRandomLoveEmojis() {
        return LOVE_EMOJIS_LIST[Math.floor(Math.random() * LOVE_EMOJIS_LIST.length)];
    }
    
    const pages = {
        1: {
            content: (goToPage) => `
                <h1>✨ J'ai créé cette surprise pour toi ma vie ✨</h1>
                <p class="subtitle">Tu aimerais la voir ?</p>
                <div class="btn-group" style="display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn-outline" id="btnNon" style="background: transparent; border: 2px solid #b13b4b;">NON</button>
                    <button class="btn-primary" id="btnOui">OUI</button>
                </div>
                <p class="warning-text">❤️ Réfléchis bien avant de choisir ! ❤️</p>
            `,
            onMount: (goToPage) => {
                document.getElementById('btnNon')?.addEventListener('click', () => goToPage(4));
                document.getElementById('btnOui')?.addEventListener('click', () => goToPage(2));
            }
        },
        
        2: {
            content: (goToPage) => `
                <h2>🎁 Choisis ta surprise 🎁</h2>
                <div class="choices-container">
                    <div class="choice-card" data-choice="photos">
                        <div class="choice-icon">📸</div>
                        <div class="choice-text">
                            <h3>Nos Photos</h3>
                            <p>Nos 14 plus beaux souvenirs</p>
                        </div>
                    </div>
                    <div class="choice-card" data-choice="chanson">
                        <div class="choice-icon">🎵</div>
                        <div class="choice-text">
                            <h3>Notre Chanson</h3>
                            <p>Ashs The Best - Aras</p>
                        </div>
                    </div>
                    <div class="choice-card" data-choice="lettre">
                        <div class="choice-icon">💌</div>
                        <div class="choice-text">
                            <h3>Une Lettre d'Amour</h3>
                            <p>Des mots venus du cœur</p>
                        </div>
                    </div>
                </div>
                <button class="retour-btn" id="retourAccueil">← RETOUR</button>
            `,
            onMount: (goToPage) => {
                document.querySelectorAll('.choice-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const choice = card.dataset.choice;
                        if (choice === 'photos') goToPage('photos');
                        if (choice === 'chanson') goToPage('chanson');
                        if (choice === 'lettre') goToPage('lettre');
                    });
                });
                document.getElementById('retourAccueil')?.addEventListener('click', () => goToPage(1));
            }
        },
        
        photos: {
            content: (goToPage) => {
                let photosHtml = '';
                for (let i = 0; i < PHOTOS_ALBUM.length; i++) {
                    const photo = PHOTOS_ALBUM[i];
                    const loveEmojis = getRandomLoveEmojis();
                    if (photo.src) {
                        photosHtml += `
                            <div class="photo-item">
                                <img src="${photo.src}" alt="Souvenir" class="real-photo" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'photo-placeholder\\'>📸❤️</div><div class=\\'love-emojis\\'>${loveEmojis}</div>'">
                                <div class="love-emojis">${loveEmojis}</div>
                            </div>
                        `;
                    } else {
                        photosHtml += `
                            <div class="photo-item">
                                <div class="photo-placeholder">📸❤️</div>
                                <div class="love-emojis">${loveEmojis}</div>
                            </div>
                        `;
                    }
                }
                return `
                    <h2>📸 Nos Souvenirs</h2>
                    <div class="photo-gallery">
                        ${photosHtml}
                    </div>
                    <button class="retour-btn" id="retourChoix">← RETOUR AU CHOIX</button>
                `;
            },
            onMount: (goToPage) => {
                document.getElementById('retourChoix')?.addEventListener('click', () => goToPage(2));
            }
        },
        
        chanson: {
            content: (goToPage) => `
                <h2>🎶 Ashs The Best - Aras</h2>
                <div class="youtube-container">
                    <iframe 
                        src="${YOUTUBE_EMBED_URL}" 
                        title="Ashs The Best - Aras"
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="song-info">
                    <p>❤️ Cette chanson me fait toujours penser à toi ❤️</p>
                    <p style="font-size: 0.9rem;">Si la vidéo ne charge pas, <a href="${YOUTUBE_WATCH_URL}" target="_blank" style="color: #b13b4b;">clique ici pour l'ouvrir sur YouTube</a></p>
                </div>
                <button class="retour-btn" id="retourChoix">← RETOUR AU CHOIX</button>
            `,
            onMount: (goToPage) => {
                document.getElementById('retourChoix')?.addEventListener('click', () => goToPage(2));
            }
        },
        
        lettre: {
            content: (goToPage) => `
                <div class="love-letter">
                    <p>Mon amour,</p>
                    <p>Je prends un moment pour t'écrire ces mots, parce que parfois les sentiments sont encore plus beaux quand ils sont posés noir sur blanc. Depuis que tu es entrée dans ma vie, tout a changé d'une manière que je n'aurais jamais imaginée. Tu es devenue une partie de moi, de mes pensées, de mes rêves et même de mes projets.</p>
                    <p>J'aime la façon dont tu me fais sourire sans effort, la manière dont ta présence suffit à apaiser mes journées les plus compliquées. Avec toi, tout paraît plus simple, plus vrai. Tu es cette personne qui me comprend sans que j'aie besoin de trop parler, celle qui me soutient même quand je doute de moi.</p>
                    <p>Je repense souvent à tous les moments qu'on a partagés, même les plus simples… parce que avec toi, chaque instant devient spécial. Et même les moments où il n'y a pas de photos restent gravés en moi comme les plus précieux.</p>
                    <p>Je veux que tu saches que je tiens énormément à toi. Peu importe les épreuves, les distances ou les défis, je serai là. Parce que ce que je ressens pour toi est sincère, profond, et ça ne fait que grandir chaque jour.</p>
                    <p>Merci d'être toi, tout simplement.</p>
                    <div class="signature">Je t'aime ❤️</div>
                </div>
                <button class="retour-btn" id="retourChoix">← RETOUR AU CHOIX</button>
            `,
            onMount: (goToPage) => {
                document.getElementById('retourChoix')?.addEventListener('click', () => goToPage(2));
            }
        },
        
        4: {
            content: (goToPage) => `
                <h2>💪 Je te promets que tu vas aimer 💪</h2>
                <div class="btn-group">
                    <button class="btn-primary" id="reessayerBtn">REESSAYE</button>
                </div>
                <p style="margin-top: 20px;">Ne fais pas la difficile, clique et découvre la surprise 🥺👉👈</p>
            `,
            onMount: (goToPage) => {
                document.getElementById('reessayerBtn')?.addEventListener('click', () => goToPage(1));
            }
        }
    };

    class App {
        constructor(container) {
            this.container = container;
            this.currentPage = 1;
            this.render();
        }

        goToPage(pageId) {
            if (pages[pageId]) {
                this.currentPage = pageId;
                this.render();
            }
        }

        render() {
            const page = pages[this.currentPage];
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            
            const contentHtml = page.content(this.goToPage.bind(this));
            pageDiv.innerHTML = contentHtml;
            
            this.container.innerHTML = '';
            this.container.appendChild(pageDiv);
            
            if (page.onMount) {
                page.onMount(this.goToPage.bind(this));
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('app');
        if (container) {
            new App(container);
        }
    });
</script>
</body>
</html>
